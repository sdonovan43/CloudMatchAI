name: CloudMatchAI CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: "0 */6 * * *"


jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m venv env
        source env/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        source env/bin/activate
        playwright install --with-deps chromium

    - name: Lint code
      run: |
        source env/bin/activate
        pip install pylint
        pylint scraper.py storage.py dedupe.py || true

    - name: Run scraper
      env:
        STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
        COSMOS_URL: ${{ secrets.COSMOS_URL }}
        COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
      run: |
        source env/bin/activate
        python scraper.py

    - name: Generate dashboard data
      run: |
        source env/bin/activate
        python - << 'EOF'
import json
from storage import get_top_jobs
from datetime import datetime

data = {
    "last_scrape": datetime.utcnow().isoformat(),
    "top_jobs": []
}

for job in get_top_jobs(limit=10):
    if isinstance(job, tuple):
        title, company, location, url, score, scraped_at = job
        data["top_jobs"].append({
            "title": title,
            "company": company,
            "url": url,
            "score": score
        })
    else:
        data["top_jobs"].append({
            "title": job["title"],
            "company": job["company"],
            "url": job["url"],
            "score": job["score"]
        })

with open("docs/data.json", "w") as f:
    json.dump(data, f, indent=2)
EOF

    - name: Commit dashboard updates
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add docs/data.json
        git commit -m "Update dashboard data" || echo "No changes to commit"
        git push
