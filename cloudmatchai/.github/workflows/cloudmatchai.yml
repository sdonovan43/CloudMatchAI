name: CloudMatchAI CI/CD

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # Run every 6 hours

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m venv env
        source env/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        source env/bin/activate
        playwright install --with-deps chromium

    - name: Lint code
      run: |
        source env/bin/activate
        pip install pylint
        pylint scraper.py storage.py dedupe.py || true

    - name: Run scraper
      env:
        STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
        COSMOS_URL: ${{ secrets.COSMOS_URL }}
        COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
      run: |
        source env/bin/activate
        python scraper.py

    - name: Upload SQLite DB artifact (optional)
      if: env.STORAGE_BACKEND == 'sqlite'
      uses: actions/upload-artifact@v4
      with:
        name: jobs-database
        path: jobs.db

  
