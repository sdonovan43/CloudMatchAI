name: CloudMatchAI Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Azure Container Registry Login
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cloudmatchai:latest .

    - name: Push Docker image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/cloudmatchai:latest

    - name: Deploy to Azure Container Apps
      uses: azure/cli@v2
      with:
        inlineScript: |
          az containerapp update \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/cloudmatchai:latest \
            --set-env-vars STORAGE_BACKEND=${{ secrets.STORAGE_BACKEND }} COSMOS_URL=${{ secrets.COSMOS_URL }} COSMOS_KEY=${{ secrets.COSMOS_KEY }}
